version: "0.3.0"

device:
  id: schneider_electric_pm3250
  manufacturer: Schneider Electic
  model: PM3250
  description: Three-phase power meter
  protocol: modbus_rtu

registers:
  ### Flex log ??

  ### System
  "30":
    display_name: "Meter Name"
    name: meter_name
    type: string # UTF8?
    unit: ""
    register_type: holding
    length: 20
  "50":
    display_name: "Meter Model"
    name: meter_model
    type: string
    unit: ""
    register_type: holding
    lenght: 20
  "70":
    display_name: "Manufacturer"
    name: manufacturer
    type: string
    unit: ""
    register_type: holding
    lenght: 20
  "130":
    display_name: "Serial Number"
    name: serial_number
    type: uint32
    unit: ""
    register_type: holding
    lenght: 2
  "132":
    display_name: "Date of Manufacture"
    name: manufacture_date
    type: string # Date/Time
    unit: ""
    register_type: holding
    lenght: 4
  "136":
    display_name: "Hardware Revision"
    name: hardware_revision
    type: string # UTF8
    unit: ""
    register_type: holding
    lenght: 5
  "1637":
    display_name: "Present Firmware Version (DLF format): X.Y.ZTT"
    name: firmware_version
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
  "1701":
    display_name: "Present Language Version (DLF format): X.Y.ZTT"
    name: language_version
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
  "1845":
    display_name: "Year 0-99 (year from 2000 to 2099)"
    name: year
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
    write_access: false # but writable via the command interface (see User Manual)
  "1846":
    display_name: "Month (b11:b8), Weekday (b7:b5), Day (b4:b0)"
    name: month_weekday_day
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
    write_access: false # but writable via the command interface (see User Manual)
  "1847":
    display_name: "Hour (b12:b8) and Minute (b5:b0)"
    name: hour_minute
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
    write_access: false # but writable via the command interface (see User Manual)
  "1848":
    display_name: "Millisecond"
    name: millisecond
    type: uint16
    unit: ""
    register_type: holding
    lenght: 1
    write_access: false # but writable via the command interface (see User Manual)

