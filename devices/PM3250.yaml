version: "0.3.0"

device:
  id: schneider_electric_pm3250
  manufacturer: Schneider Electic
  model: PM32050
  description: Three-phase power meter
  protocol: modbus_rtu

registers:
  "30":
    display_name: Meter Name
    name: meter_name
    type: string # UTF8 ?!
    unit: ""
    register_type: input # ?
    length: 20
  "3000":
    display_name: "I1: phase 1 current"
    name: phase1_current
    type: float32
    unit: A
    register_type: input # ?
    length: 2 # this is inferred from float32
